[pytest]
# Avoid cacheprovider issues on Windows environments with locked temp/cache directories.
addopts = -p no:cacheprovider
norecursedirs = .git .venv venv node_modules market-intel-core pytest-cache-files-* .pytest_cache* .pytest_tmp .pytest_tmp_* .tmp_py312* artifacts_* provider_* _test_runtime_* results\_test_runtime_* tmp*
markers =
    local_data: tests that read local operator OHLCV files and skip when representative files are missing
